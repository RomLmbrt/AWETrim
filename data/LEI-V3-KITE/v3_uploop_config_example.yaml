# V3 Pumping Cycle Configuration
# Defines the complete pumping cycle including reelout, reel-in, wind conditions, and transitions

# Reelout Phase Configuration
reelout:
  pattern_type: cst_lissajous       # Pattern type for the reelout phase
  
  # Path Parameters
  path_parameters:
    r0: 230                     # Initial radial distance in m
    az_amp0: 0.27 # Azimuth amplitude
    beta_amp0: 0.05        # Elevation amplitude
    beta_coeffs: [0, 0, 0, 0, 0]         # Beta coefficients (list)
    az_coeffs: [0, 0,0,0,0]  # Azimuth coefficients (list)
    kbeta: 0                    # Beta gain
    beta0: 0.7              # Initial elevation angle
    kappa: 1                    # Curvature parameter
    downloops: false         # Enable downloops (false for uploops)
  
  radial_parameters:
    reeling_strategy: force     # 'force' or 'constant'
    force_model: linear      # 'linear' or 'quadratic' (only for force strategy)
    reeling_speed: 0.0          # m/s (only for constant strategy)
    max_tether_force: 8400      # N (only for force strategy)
    min_tether_force: 1500      # N (only for force strategy)
    softplus: true
    softplus_beta: 1.0e-3
    softminus: trues
    softminus_beta: 1.0e-3
    slope_winch_ro: 5555.55        # N/(m/s)^2 for quadratic, N/(m/s) for linear
    offset_winch_ro: 0.58          # m/s
  
  
  # Simulation Parameters
  sim_parameters:
    start_time: 0               # Start time in s
    end_time: 35                # End time in s
    start_angle: 0  # 0 in radians
    end_angle: 6.283185307179586    # 2*pi in radians (N=1 full loop)
    n_points: 100              # Number of discretization points
    input_depower: 0.0          # Depower setting (0.0 to 1.0)

# Reel-in Phase Configuration (placeholder for future implementation)
reelin:
  # TODO: Add reel-in specific parameters
  # e.g., retraction_speed, depower_setting, path_strategy, etc.
  enabled: false
