metadata:
  name: LEI-V3-KITE
  description: LEI V3 soft kite pumping ground gen system (TU Delft / Kitepower
    research kite)
  note: None
  awesIO_version: 0.1.0
  schema: system_schema.yml

assembly:
  # Joint-id topology: kite KCU (K1) -> tether top (T1); tether bottom (T2) -> drum (G1)
  connectivity_matrix:
  - [K1, T1]
  - [T2, G1]

components:
  kites:
  - name: LEI-V3 Kite
    type: soft_kite_kcu
    version: 1.0
    joints:
      kcu_joint:
        id: K1
    # Kite aggregate (wing + bridle + KCU) mass/CG/inertia is derived on demand
    # from the structural geometry via
    # awetrim.aerostructural.utils.compute_kite_aggregate — it is not stored here.
    wing:
      name: LEI-V3
      type: LEI_soft_kite
      version: 3.0
      structure:
        # Populated by populate_system_yml.py
        projected_surface_area: 17.2119 # m²
        span: 8.282                    # m
        mass: 10.9926                  # kg
        center_of_mass:                         # m
        - -0.0413
        - -0.0
        - 10.3
        inertia_tensor:
        - - 84.6787
          - 0.0
          - 0.8031
        - - 0.0
          - 18.6955
          - 0.0
        - - 0.8031
          - 0.0
          - 88.6081
        side_projected_area: 0.2923
        planform_surface_area: 21.0559
    bridle:
      name: LEI-V3 Bridle
      type: LEI_soft_kite_bridle
      version: 1.0
      structure:
        bridle_point_node: [0, 0, 0]
        # Populated by populate_system_yml.py
        total_nominal_line_length: 79.522    # m, sum of unique bridle_line l0 values
        avg_line_diameter: 0.00285           # m, connection-length-weighted average
        material:
          type: dyneema
          density: 724.0           # kg/m³
          youngs_modulus: 20.0e+9   # Pa
          damping_per_stiffness: 0.0
        mass: 2.5875                         # kg, lines + pulleys
    control_system:
      name: LEI-V3 KCU
      type: kite_control_unit
      version: 1.0
      structure:
        length: 1.0      # m
        diameter: 0.48   # m
        mass: 8.4        # kg
        center_of_mass: [0.0, 0.0, 0.0]  # m, same as bridle_point_node
        # Actuator operational limits used by the trajectory optimizer. The
        # trim optimiser reads these as hardware bounds (range) and slew-rate
        # limits (rate); they override the numerical fallbacks in
        # awetrim.utils.defaults.DEFAULT_OPTI_LIMITS.
        steering:
          range: [-0.35, 0.35]   # u_s deflection [-] (u_s = -kcu_deflection/100)
          rate: [-0.29, 0.29]    # d(u_s)/dt [1/s]
        depower:
          range: [1.1, 2.3]      # power-tape length l_dp [m]
          rate: [-0.2, 0.2]      # d(l_dp)/dt [m/s]
  tethers:
  - name: LEI-V3 Tether
    type: non_conductive_tether
    version: 1.0
    joints:
      upper_tether_joint:
        id: T1
      lower_tether_joint:
        id: T2
    structure:
      length: 350.0        # m  (max operational reference length)
      diameter: 0.010      # m  (10 mm)
      density: 970.0       # kg/m³  (Dyneema SK78)
      max_tether_force: 8400.0  # N
      conductive: false
      material:
        type: Dyneema-SK78
        youngs_modulus: 850.0e+6  # Pa (0.85 GPa)
  ground_station:
    name: LEI-V3 Ground Station
    type: pumping_ground_gen_station
    version: 1.0
    joints:
      drum_joint:
        id: G1
    structure:
      mass: 0.0
    drums:
    - name: LEI-V3 Drum
      type: electric_winch
      max_tether_force: 8400.0  # N
    gearboxes:
    - name: LEI-V3 Gearbox
      type: planetary
      gear_ratio: 1.0
