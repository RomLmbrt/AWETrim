metadata:
  description: "ROM aerodynamic coefficients and tether settings for the LEI-V3 kite."
  control_convention: >-
    u_p is the absolute power-tape length l_dp [m] (2019 powered ~= 1.7 m,
    depowered ~= 2.1 m); u_s is steering normalized so that full steering = +/-1
    (= -kcu_actual_steering/100). Matches awetrim.identification.controls and the
    rom_config_aero/EKF identified configs.

aerodynamics:
  model: "coeffs"
  params:
    # CD0: 0.1130532
    CL0: 0.04671295
    # angle_pitch_depower = angle_pitch_depower_0 + u_p * delta_pitch_depower
    # (kite.py: angle_pitch_depower_for), with u_p = l_dp [m].
    #
    # Anchored to the PHYSICAL depower states (length-based, not the flight's
    # normalized up signal):
    #   powered    l_dp = 1.7 m -> apd = -0.12 rad  (legacy powered pitch)
    #   depowered  l_dp = 2.1 m -> apd = -0.25 rad
    # The powered->depowered angle swing is 0.13 rad (the legacy -0.13). Because
    # the model multiplies by l_dp in METRES, delta is that swing PER METRE of
    # tape, not the swing itself:
    #   delta_pitch_depower   = -0.13 / (2.1 - 1.7) = -0.325   [rad/m]
    #   angle_pitch_depower_0 = -0.12 - 1.7*(-0.325) = 0.4325  [rad]
    CD0: 0.113142
    angle_pitch_depower_0: 0.638999
    delta_pitch_depower: -0.456901
  coefficients:
    CL:
      - var: alpha
        power: 1
        coef: 6.09131779
      - var: alpha
        power: 2
        coef: -10.11227433
      - var: u_s
        power: 1
        coef: 0.0
      - var: u_p
        power: 1
        coef: -0.0
    CD:
      - var: alpha
        power: 1
        coef: 0.01460944
      - var: alpha
        power: 2
        coef: 1.56422478
      # u_s terms rescaled for the new convention u_s = -kcu/100 (full = +/-1).
      # Legacy validation used u_s = -kcu/max|kcu| (~ -kcu/35), so same physical
      # steering now gives a 0.35x smaller u_s; coefficients divided by 0.35
      # (x 100/35 ~= 2.857). In the solved QS trim only the CD_us/CS ratio
      # (0.1875) matters, so this is physics-neutral; it also matches the
      # -kcu/100 guess scale and improves IPOPT conditioning.
      - var: u_s
        power: 1
        coef: 0.0642857   # = 0.0225 / 0.35
      - var: u_p
        power: 1
        coef: -0.00
    CS:
      - var: u_s
        power: 1
        coef: 0.344410   # = 0.12 / 0.35

tether:
  model: "williams"
  n_elements: 10
  wind_model: "uniform"
  cf: 0.01
  is_elastic: false
