# Stability analysis configuration for compute_stability_derivatives.py.
#
# Pass with --stability-config data/LEI-V3-KITE/stability_config.yaml
#
# Valid state names (canonical body-frame order):
#   u     -- body x velocity (course axis)
#   v     -- body y velocity (normal axis)
#   w     -- body z velocity (radial axis)   <- "vertical speed"
#   z     -- radial position perturbation along course-frame z/radial axis
#   phi   -- roll angle
#   theta -- pitch angle
#   psi   -- yaw angle
#   p     -- body roll rate
#   q     -- body pitch rate
#   r     -- body yaw rate
#
# Use the literal string `all` to select every state.
# `frame` selects the linearisation axes:
#   course -- course/normal/radial axes (default)
#   body   -- identified rigid-body axes from --rigid-body-result

states: [u, w, z, theta, q, phi, psi, p, r]
coupled: false
frame: course
